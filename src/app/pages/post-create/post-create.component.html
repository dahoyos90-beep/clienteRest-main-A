<section class="editor-shell">
  <header class="page-head">
    <div>
      <p class="eyebrow">✨ Nueva entrada</p>
      <h1>Redacta una publicación</h1>
      <p>Completa la información principal y deja el contenido listo para revisarlo o compartirlo.</p>
    </div>
    <a class="btn btn-ghost" routerLink="/posts">
      <span class="icon">arrow_back</span>
      Volver
    </a>
  </header>

  @if (error()) {
    <p class="form-error" role="alert">
      <span class="icon">error</span>
      {{ error() }}
    </p>
  }

  <app-post-form
    [disabled]="submitting()"
    (formSubmit)="onCreate($event)"
    (onCancel)="router.navigate(['/posts'])"
  />
</section>

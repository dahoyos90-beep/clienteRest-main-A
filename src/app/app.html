<div class="app-shell">
  <header class="topbar">
    <a class="brand" routerLink="/posts">
      <span class="brand-mark">📝</span>
      <strong>Panel Editorial</strong>
    </a>
    <nav class="nav-links">
      <a routerLink="/posts" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">
        <span class="icon">home</span>
        Inicio
      </a>
      <a routerLink="/posts/new" routerLinkActive="is-active">
        <span class="icon">add_circle</span>
        Nueva publicación
      </a>
    </nav>
  </header>

  <main class="app-content">
    <router-outlet></router-outlet>
  </main>

  <footer class="footer">
    <p>© 2024 Panel Editorial · Gestión de contenido</p>
  </footer>
</div>
